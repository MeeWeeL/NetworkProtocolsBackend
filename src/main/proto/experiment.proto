syntax = "proto3";

package ru.meeweel.network_protocols_backend.grpc;

option java_multiple_files = true;
option java_package = "ru.meeweel.network_protocols_backend.grpc";
option java_outer_classname = "ExperimentProto";

service ExperimentGrpcService {
  rpc Health(HealthRequest) returns (HealthResponse);
  rpc ExecuteScenario(GrpcScenarioRequest) returns (GrpcScenarioResponse);
  rpc StreamScenario(GrpcScenarioRequest) returns (stream GrpcScenarioResponse);
}

message HealthRequest {}

message HealthResponse {
  string status = 1;
  string service = 2;
  repeated string transport = 3;
}

enum GrpcScenarioType {
  GRPC_SCENARIO_UNSPECIFIED = 0;
  S1_SHORT_READ = 1;
  S2_LARGE_READ = 2;
  S3_PARTIAL_LARGE_READ = 3;
  S4_PAGE_READ = 4;
  S5_SMALL_WRITE_ACK = 5;
  S6_LARGE_WRITE_ACK = 6;
  S7_EVENT_STREAM = 7;
  S8_HEAVY_EVENT_STREAM = 8;
  S9_LONG_SESSION = 9;
}

enum GrpcTransportType {
  GRPC_TRANSPORT_UNSPECIFIED = 0;
  REST = 1;
  SOAP = 2;
  GRAPHQL = 3;
  WEBSOCKET = 4;
  GRPC = 5;
}

enum GrpcFailureMode {
  GRPC_FAILURE_NONE = 0;
  VALIDATION = 1;
  TIMEOUT = 2;
  UNAVAILABLE = 3;
  BUSINESS_CONFLICT = 4;
  INTERNAL = 5;
}

message GrpcScenarioRequest {
  string request_id = 1;
  string correlation_id = 2;
  int32 payload_size_bytes = 3;
  int32 event_count = 4;
  int64 artificial_delay_ms = 5;
  map<string, string> metadata = 6;
  string payload = 7;
  GrpcScenarioType scenario = 8;
  string session_id = 9;
  string q_class = 10;
  string load_profile = 11;
  GrpcFailureMode failure_mode = 12;
}

message GrpcLargeReadParty {
  string party_id = 1;
  string display_name = 2;
  string role = 3;
  string organization = 4;
  string segment = 5;
  double rating = 6;
}

message GrpcLargeReadContact {
  string kind = 1;
  string label = 2;
  string value = 3;
  bool preferred = 4;
  string availability = 5;
}

message GrpcLargeReadAttribute {
  string code = 1;
  string name = 2;
  string value = 3;
  string unit = 4;
  string category = 5;
  bool searchable = 6;
}

message GrpcLargeReadParameter {
  string key = 1;
  string title = 2;
  string value_type = 3;
  string value = 4;
  string unit = 5;
  bool required = 6;
  string source = 7;
}

message GrpcLargeReadParameterGroup {
  string group_code = 1;
  string group_title = 2;
  bool editable = 3;
  repeated GrpcLargeReadParameter parameters = 4;
}

message GrpcLargeReadLineItem {
  string item_id = 1;
  string sku = 2;
  string title = 3;
  string category = 4;
  int32 quantity = 5;
  string unit = 6;
  double unit_price = 7;
  double total_price = 8;
  string availability_status = 9;
  repeated string tags = 10;
}

message GrpcLargeReadRelatedEntity {
  string entity_id = 1;
  string relation_type = 2;
  string title = 3;
  string status = 4;
  string priority = 5;
}

message GrpcLargeReadAttachment {
  string attachment_id = 1;
  string file_name = 2;
  string mime_type = 3;
  int64 size_bytes = 4;
  string checksum = 5;
  string source_system = 6;
}

message GrpcLargeReadTimelineEntry {
  string event_code = 1;
  string title = 2;
  string actor = 3;
  int64 occurred_at_epoch_ms = 4;
  string status = 5;
  string description = 6;
}

message GrpcLargeReadMetrics {
  double summary_score = 1;
  double risk_score = 2;
  double completeness_pct = 3;
  double freshness_hours = 4;
  int32 response_items = 5;
  int64 attachment_bytes = 6;
  int32 warnings = 7;
}

message GrpcLargeReadDocument {
  string document_id = 1;
  string external_id = 2;
  int32 revision = 3;
  int64 generated_at_epoch_ms = 4;
  string locale = 5;
  string currency = 6;
  string title = 7;
  string subtitle = 8;
  string category = 9;
  string status = 10;
  GrpcLargeReadParty owner = 11;
  repeated GrpcLargeReadContact contacts = 12;
  repeated string tags = 13;
  repeated string flags = 14;
  repeated GrpcLargeReadAttribute attributes = 15;
  repeated GrpcLargeReadParameterGroup parameter_groups = 16;
  repeated GrpcLargeReadLineItem line_items = 17;
  repeated GrpcLargeReadRelatedEntity related_entities = 18;
  repeated GrpcLargeReadAttachment attachments = 19;
  repeated GrpcLargeReadTimelineEntry timeline = 20;
  GrpcLargeReadMetrics metrics = 21;
  repeated string notes = 22;
  string narrative = 23;
}

message GrpcLargeReadPreview {
  string document_id = 1;
  string title = 2;
  string status = 3;
  string primary_badge = 4;
  double summary_score = 5;
}

message GrpcPageReadSummary {
  double total_amount = 1;
  int32 selected_count = 2;
  int32 high_priority_count = 3;
  int32 stale_count = 4;
  int32 warning_count = 5;
}

message GrpcPageReadFacetBucket {
  string value = 1;
  int32 count = 2;
  bool selected = 3;
}

message GrpcPageReadFacet {
  string name = 1;
  string title = 2;
  repeated GrpcPageReadFacetBucket buckets = 3;
}

message GrpcPageReadPage {
  int32 page_number = 1;
  int32 page_size = 2;
  int32 total_items = 3;
  string next_cursor = 4;
  string sort_by = 5;
  repeated string applied_filters = 6;
  GrpcPageReadSummary summary = 7;
  repeated GrpcPageReadFacet facets = 8;
  repeated GrpcLargeReadPreview items = 9;
}

message GrpcStreamEventSummary {
  int32 impacted_items = 1;
  int32 warning_count = 2;
  double score_delta = 3;
  string current_status = 4;
}

message GrpcStreamEvent {
  string event_id = 1;
  string event_type = 2;
  string document_id = 3;
  int64 emitted_at_epoch_ms = 4;
  int32 revision = 5;
  string priority = 6;
  GrpcLargeReadPreview preview = 7;
  repeated string changed_fields = 8;
  repeated GrpcLargeReadPreview related_items = 9;
  repeated string tags = 10;
  repeated string notes = 11;
  GrpcStreamEventSummary summary = 12;
}

message GrpcScenarioResponse {
  string request_id = 1;
  string correlation_id = 2;
  string session_id = 3;
  GrpcScenarioType scenario = 4;
  GrpcTransportType transport = 5;
  string canonical_operation = 6;
  string status = 7;
  int32 payload_size_bytes = 8;
  string payload_checksum = 9;
  int32 sequence = 10;
  int64 accepted_at_epoch_ms = 11;
  int64 completed_at_epoch_ms = 12;
  int64 server_processing_time_ms = 13;
  string payload = 14;
  map<string, string> metadata = 15;
  int64 server_processing_time_micros = 16;
  GrpcLargeReadDocument document = 17;
  GrpcLargeReadPreview preview = 18;
  GrpcPageReadPage page = 19;
  GrpcStreamEvent stream_event = 20;
}
